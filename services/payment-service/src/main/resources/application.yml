spring:
  application:
    name: payment-service
  profiles:
    default: local
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5433/orderflow_payments
    username: orderflow
    password: orderflow
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  cloud:
    function:
      definition: orderEvents
    stream:
      bindings:
        # Consome o ciclo de vida do pedido (Ordering): OrderPlaced autoriza,
        # OrderConfirmed captura, OrderCancelled compensa (void/refund) — a
        # participação do Payment na saga coreografada.
        orderEvents-in-0:
          destination: orders.events
          group: payment-service
          consumer:
            max-attempts: 3
            back-off-initial-interval: 1000
            back-off-multiplier: 2.0
      kafka:
        binder:
          brokers: localhost:9092
        bindings:
          orderEvents-in-0:
            consumer:
              enable-dlq: true
              dlq-name: payment-service.orders.events.dlq
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/orderflow

server:
  port: 8082

management:
  metrics:
    tags:
      application: ${spring.application.name}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

orderflow:
  security:
    # Audiences aceitas no claim `aud` do JWT (lista separada por vírgula).
    audiences: payment-service
  payment:
    gateway: ${PAYMENT_GATEWAY:fake}
    # OrderPlaced não carrega o meio de pagamento no contrato atual do Ordering;
    # a borda de mensageria autoriza com este padrão (vide OrderEventHandler).
    default-method: ${PAYMENT_DEFAULT_METHOD:CREDIT_CARD}
    stripe:
      base-url: ${STRIPE_BASE_URL:https://api.stripe.com}
      secret-key: ${STRIPE_SECRET_KEY:just-for-tests}
      connection-timeout: 2s
      read-timeout: 5s

resilience4j:
  circuitbreaker:
    instances:
      payment-gateway:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        # Apenas falhas técnicas abrem o circuito; declínios de negócio
        # retornam normalmente e não são exceções.
        recordExceptions:
          - com.orderflow.payment.application.port.PaymentGatewayException
