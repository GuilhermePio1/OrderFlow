spring:
  application:
    name: payment-service
  profiles:
    default: local
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5433/orderflow_payments
    username: orderflow
    password: orderflow
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  cloud:
    stream:
      kafka:
        binder:
          brokers: localhost:9092
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/orderflow

server:
  port: 8082

management:
  metrics:
    tags:
      application: ${spring.application.name}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

orderflow:
  payment:
    gateway: ${PAYMENT_GATEWAY:fake}
    stripe:
      base-url: ${STRIPE_BASE_URL:https://api.stripe.com}
      secret-key: ${STRIPE_SECRET_KEY:}
      connection-timeout: 2s
      read-timeout: 5s

resilience4j:
  circuitbreaker:
    instances:
      payment-gateway:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        # Apenas falhas técnicas abrem o circuito; declínios de negócio
        # retornam normalmente e não são exceções.
        recordExceptions:
          - com.orderflow.payment.application.port.PaymentGatewayException
