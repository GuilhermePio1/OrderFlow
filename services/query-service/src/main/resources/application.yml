spring:
  application:
    name: query-service
  profiles:
    default: local
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    stream:
      kafka:
        binder:
          brokers: localhost:9092
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/orderflow
  mongodb:
    uri: mongodb://orderflow:orderflow@localhost:27017/orderflow_query?authSource=admin

server:
  port: 8085

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
