# Scrape config for the local stack. The Spring services run on the host
# (./gradlew bootRunAll), so they are reached via host.docker.internal.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: orderflow-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels: { application: api-gateway }
      - targets: ["host.docker.internal:8081"]
        labels: { application: order-service }
      - targets: ["host.docker.internal:8082"]
        labels: { application: payment-service }
      - targets: ["host.docker.internal:8083"]
        labels: { application: inventory-service }
      - targets: ["host.docker.internal:8084"]
        labels: { application: shipping-service }
      - targets: ["host.docker.internal:8085"]
        labels: { application: notification-service }
