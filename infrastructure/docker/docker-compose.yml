services:
  postgres:
    image: postgres:18
    container_name: orderflow-postgres
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      POSTGRES_USER: orderflow
      POSTGRES_PASSWORD: orderflow
      POSTGRES_MULTIPLE_DATABASES: orderflow_orders,orderflow_payments,orderflow_inventory,orderflow_notifications
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./postgres/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderflow"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - orderflow-network

  mongodb:
    image: mongo:8
    container_name: orderflow-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: orderflow
      MONGO_INITDB_ROOT_PASSWORD: orderflow
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - orderflow-network

  redis:
    image: redis:8
    container_name: orderflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - orderflow-network

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: orderflow-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: orderflow-local-cluster
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/usr/bin/kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - orderflow-network

  kafka-connect:
    image: quay.io/debezium/connect:2.7.3.Final
    container_name: orderflow-kafka-connect
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: orderflow-connect
      CONFIG_STORAGE_TOPIC: orderflow.connect.configs
      OFFSET_STORAGE_TOPIC: orderflow.connect.offsets
      STATUS_STORAGE_TOPIC: orderflow.connect.status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      VALUE_CONVERTER: org.apache.kafka.connect.storage.StringConverter
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/ >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - orderflow-network

  kafka-connect-init:
    image: curlimages/curl:8.10.1
    container_name: orderflow-kafka-connect-init
    depends_on:
      kafka-connect:
        condition: service_healthy
    volumes:
      - ./kafka-connect/order-outbox-connector.json:/connector.json:ro
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "Registering Debezium order-outbox connector...";
        curl -fsS -X PUT \
          -H "Content-Type: application/json" \
          --data @/connector.json \
          http://kafka-connect:8083/connectors/order-outbox-connector/config \
          && echo "" && echo "Connector registered."
    restart: "no"
    networks:
      - orderflow-network

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: orderflow-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-orderflow.json:/opt/keycloak/data/import/realm-orderflow.json:ro
    networks:
      - orderflow-network

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  kafka-data:

networks:
    orderflow-network:
      driver: bridge